<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan1</title>
    <style>
        .solid {
            border: 3px solid black;
            padding: 10px;
            margin: 10px;
        }
        .double {
            border: 3px double blue;
            padding: 10px;
            margin: 10px;
        }
        .groove {
            border: 3px groove green;
            padding: 10px;
            margin: 10px;
        }
        .ridge {
            border: 3px ridge red;
            padding: 10px;
            margin: 10px;
        }    
    </style>

</head>
<body>
    <h1>Latihan 1</h1>
    <h2>Buat 4 kotak dengan : </h2>
    <ul>
        <li>Border solid warna hitam</li>
        <li>Border double warna biru</li>
        <li>Border groove warna hijau</li>
        <li>Border ridge warna merah</li>
    </ul>
    
    <div class="solid">Garis solid dengan warna garis hitam</div>
    <div class="double">Garis double dengan garis warna biru</div>
    <div class="groove">Garis groove dengan garis warna hijau</div>
    <div class="ridge">Garis ridge dengan garis warna merah</div>
</body>
</html>
