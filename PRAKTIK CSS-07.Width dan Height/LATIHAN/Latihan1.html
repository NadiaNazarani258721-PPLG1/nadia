<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan1</title>
    <style>
        .box1 {
            width: 200px;
            height: 200px;
            background-color: lightskyblue;
        }
        .box2 {
            width: 50%;
            height: 150px;
            background-color: dodgerblue;
        }
        .box3 {
            width: 80vw;
            height: 30vh;
            background-color: darkblue;
        }
    </style>
</head>
<body>
    <h1>Latihan 1</h1>
    <h2>Buat 3 box dengan ukuran berbeda : </h2>
    <ul>
        <li>Box 1 : 200px x 200px</li>
        <li>Box 2 : 50% x 150px</li>
        <li>Box 3 : 80vw x 30vh</li>
    </ul>

    <div class="box1">Box 1 dengan ukuran 200px x 200px</div>
    <div class="box2">Box 2 dengan ukuran 50% x 150px</div>
    <div class="box3">Box 3 dengan ukuran 80vw x 30vh</div>
</body>
</html>
