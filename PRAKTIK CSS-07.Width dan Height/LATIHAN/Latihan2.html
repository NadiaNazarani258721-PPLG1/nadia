<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .header {
            width: 100%;
            height: 100px;
            background-color: lightskyblue;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .content {
            width: 100%;
            height: 300px;
            background-color: dodgerblue;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer {
            width: 100%;
            height: 80px;
            background-color: darkblue;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>Latihan 2</h1>
    <h2>Buat layout sederhana : </h2>
    <ul>
        <li>Header : tinggi 100px</li>
        <li>Content : tinggi 300px</li>
        <li>Footer : tinggi 80px</li>
        <li>Semua lebar 100%</li>
    </ul>

    <div class="header">Header dengan tinggi 100px</div>
    <div class="content">Content dengan tinggi 300px</div>
    <div class="footer">Footer dengan tinggi 80px</div>
</body>
</html>
